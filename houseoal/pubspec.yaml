name: housepal
description: "HousePal - Ứng dụng quản lý nhà trọ/chung cư"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.0.0
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  
  # UI & Navigation
  go_router: ^12.0.0
  flutter_svg: ^2.0.0
  
  # Data & Serialization
  json_annotation: ^4.8.1
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.0.0
  
  # Crypto for password hashing
  crypto: ^3.0.3
  
  # Local Storage
  shared_preferences: ^2.2.0
  hive: ^2.2.0
  
  # Network
  http: ^1.1.0
  dio: ^5.3.0
  image_picker: ^1.1.2
  
  # Firebase - Firestore only
  firebase_core: ^2.13.0
  cloud_firestore: ^4.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.7.0

flutter:
  uses-material-design: true
